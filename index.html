<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة أسعار الجوالات</title>
    <link rel="icon" type="image/x-icon" href="https://fantasieshop.github.io/linktree/icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f2f5;
            color: #1a2535;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* ══ CONNECTION DIALOG ══ */
        #connOverlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 15, 25, .65);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
        }

        #connOverlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .conn-dialog {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 32px 28px;
            width: min(94vw, 460px);
            transform: translateY(18px) scale(.97);
            transition: transform .25s, opacity .25s;
            opacity: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        #connOverlay.open .conn-dialog {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .conn-field {
            margin-bottom: 14px;
        }

        .conn-field label {
            display: block;
            font-size: .82rem;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .conn-field input {
            width: 100%;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            padding: 10px 13px;
            color: #1a2535;
            font-family: 'Tajawal', sans-serif;
            font-size: .9rem;
            outline: none;
            direction: ltr;
            transition: border-color .2s, box-shadow .2s;
        }

        .conn-field input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .1);
        }

        .conn-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-conn-submit {
            flex: 1;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 9px;
            padding: 12px 20px;
            font-family: 'Tajawal', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s, transform .15s;
        }

        .btn-conn-submit:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-conn-submit:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        #connDialogStatus {
            font-size: .78rem;
            padding: 5px 10px;
            border-radius: 6px;
            display: none;
        }

        .status-ok {
            background: #dcfce7;
            color: #16a34a;
            display: inline-block !important;
        }

        .status-err {
            background: #fee2e2;
            color: #dc2626;
            display: inline-block !important;
        }

        .status-loading {
            background: #dbeafe;
            color: #2563eb;
            display: inline-block !important;
        }

        /* ══ HEADER ══ */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #2d3f55 100%);
            color: #fff;
            padding: 20px 24px;
            border-radius: 14px;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 1.45rem;
            font-weight: 800;
            color: #f1f5f9;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stat-pill {
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .15);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: .82rem;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-pill strong {
            color: #60a5fa;
            font-weight: 700;
        }

        .btn-reconnect {
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, .2);
            border-radius: 8px;
            padding: 7px 13px;
            font-family: 'Tajawal', sans-serif;
            font-size: .8rem;
            color: #94a3b8;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-reconnect:hover {
            border-color: #60a5fa;
            color: #60a5fa;
        }

        /* ══ TOOLBAR ══ */
        .toolbar {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .brand-btns {
            display: flex;
            gap: 5px;
        }

        .brand-btn {
            padding: 7px 16px;
            border-radius: 50px;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            font-size: .82rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }

        .brand-btn:hover {
            border-color: #93c5fd;
            color: #2563eb;
            background: #eff6ff;
        }

        .brand-btn.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }

        .brand-btn.apple.active {
            background: #475569;
            border-color: #475569;
        }

        .brand-btn.samsung.active {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }

        .year-select {
            padding: 8px 12px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-family: 'Tajawal', sans-serif;
            font-size: .83rem;
            color: #1a2535;
            outline: none;
            cursor: pointer;
            transition: border-color .2s;
        }

        .year-select:focus {
            border-color: #3b82f6;
        }

        .toolbar-divider {
            width: 1px;
            height: 26px;
            background: #e2e8f0;
            margin: 0 2px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: .83rem;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .btn-add {
            background: #16a34a;
            color: #fff;
        }

        .btn-add:hover {
            background: #15803d;
            transform: translateY(-1px);
        }

        .btn-add:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-ghost {
            background: #f8fafc;
            color: #64748b;
            border: 1.5px solid #e2e8f0;
        }

        .btn-ghost:hover {
            border-color: #94a3b8;
            color: #334155;
        }

        .btn-ghost:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .search-wrap {
            flex: 1;
            min-width: 180px;
            position: relative;
        }

        .search-wrap::before {
            content: '🔍';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            pointer-events: none;
        }

        .search-wrap input {
            width: 100%;
            padding: 8px 34px 8px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-family: 'Tajawal', sans-serif;
            font-size: .88rem;
            background: #f8fafc;
            color: #1a2535;
            outline: none;
            direction: rtl;
            transition: border-color .2s, box-shadow .2s;
        }

        .search-wrap input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .08);
            background: #fff;
        }

        .search-wrap input::placeholder {
            color: #94a3b8;
        }

        /* ══ RESULTS BAR ══ */
        .results-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: .8rem;
            color: #94a3b8;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 2px;
        }

        .results-bar strong {
            color: #3b82f6;
        }

        .legend {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* ══ PHONE LIST ══ */
        .phone-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .phone-item {
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 13px 16px 13px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color .2s, box-shadow .2s, transform .15s;
            position: relative;
            overflow: hidden;
        }

        /* brand colored bar on the right */
        .phone-item::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 5px;
            height: 100%;
            border-radius: 0 10px 10px 0;
        }

        .phone-item.brand-Apple::after {
            background: linear-gradient(180deg, #94a3b8, #64748b);
        }

        .phone-item.brand-Samsung::after {
            background: linear-gradient(180deg, #60a5fa, #1d4ed8);
        }

        /* subtle brand tint */
        .phone-item.brand-Apple {
            background: linear-gradient(to left, #c2ccd9 0%, #fff 70%);
        }

        .phone-item.brand-Samsung {
            background: linear-gradient(to left, #c2ccd9 0%, #fff 70%);
        }

        .phone-item:hover {
            border-color: #93c5fd;
            box-shadow: 0 4px 16px rgba(59, 130, 246, .1);
            transform: translateY(-1px);
        }

        /* ── info ── */
        .phone-info {
            display: flex;
            align-items: center;
            gap: 11px;
            width: 210px;
            flex-shrink: 0;
        }

        .phone-icon {
            width: 38px;
            height: 38px;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 19px;
            flex-shrink: 0;
        }

        .phone-details h4 {
            color: #1a2535;
            font-size: .93rem;
            font-weight: 700;
            margin-bottom: 3px;
            line-height: 1.3;
        }

        .badges {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .brand-badge {
            font-size: .66rem;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
        }

        .phone-item.brand-Apple .brand-badge {
            background: #f1f5f9;
            color: #475569;
        }

        .phone-item.brand-Samsung .brand-badge {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .year-badge {
            font-size: .66rem;
            color: #94a3b8;
            background: #f8fafc;
            padding: 2px 7px;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        /* ── prices ── */
        .phone-prices {
            flex: 1;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 8px;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 7px;
            justify-content: space-between;
        }

        .price-indicator {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .new-indicator {
            background: #16a34a;
        }

        .used-indicator {
            background: #ea580c;
        }

        .price-label {
            font-size: .76rem;
            color: #94a3b8;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* price badge — click to edit */
        .price-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 13px;
            border-radius: 7px;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .18s;
            min-width: 95px;
            user-select: none;
        }

        .price-badge.new-badge {
            background: #dcfce7;
            color: #15803d;
            border: 1.5px solid #bbf7d0;
        }

        .price-badge.new-badge:hover {
            background: #bbf7d0;
        }

        .price-badge.used-badge {
            background: #ffedd5;
            color: #c2410c;
            border: 1.5px solid #fed7aa;
        }

        .price-badge.used-badge:hover {
            background: #fed7aa;
        }

        .price-badge.empty-badge {
            background: #f8fafc;
            color: #cbd5e1;
            border: 1.5px dashed #e2e8f0;
            font-size: .76rem;
            font-weight: 500;
        }

        .price-badge.empty-badge:hover {
            border-color: #94a3b8;
            color: #94a3b8;
        }

        /* price input (edit mode) */
        .price-input-wrap {
            display: none;
            align-items: center;
            gap: 5px;
        }

        .price-input-wrap.editing {
            display: flex;
        }

        .price-input {
            width: 95px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 7px;
            padding: 5px 8px;
            color: #1a2535;
            font-family: 'Tajawal', sans-serif;
            font-size: .88rem;
            font-weight: 600;
            outline: none;
            text-align: right;
            direction: ltr;
            transition: border-color .2s, box-shadow .2s;
        }

        .price-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .1);
        }

        .price-input.new-price:focus {
            border-color: #16a34a;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, .1);
        }

        .price-input.used-price:focus {
            border-color: #ea580c;
            box-shadow: 0 0 0 3px rgba(234, 88, 12, .1);
        }

        .save-btn {
            background: #2563eb;
            border: none;
            border-radius: 6px;
            padding: 5px 9px;
            cursor: pointer;
            color: #fff;
            font-size: 13px;
            transition: all .18s;
            flex-shrink: 0;
        }

        .save-btn:hover {
            background: #1d4ed8;
        }

        .save-btn.saving {
            background: #16a34a;
        }

        /* ── delete btn — hidden until hover ── */
        .phone-actions {
            flex-shrink: 0;
        }

        .btn-delete-card {
            background: transparent;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 7px 10px;
            cursor: pointer;
            color: #e2e8f0;
            font-size: 15px;
            transition: all .2s;
            opacity: 0;
        }

        .phone-item:hover .btn-delete-card {
            opacity: 1;
            color: #94a3b8;
        }

        .btn-delete-card:hover {
            border-color: #ef4444 !important;
            color: #ef4444 !important;
            background: #fef2f2;
        }

        @media(max-width:700px) {
            .btn-delete-card {
                opacity: 1;
                color: #94a3b8;
            }

            .header-right {
                display: none;
            }
        }

        /* ══ SKELETON ══ */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 12px;
            height: 66px;
            border: 1.5px solid #e2e8f0;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0
            }

            100% {
                background-position: -200% 0
            }
        }

        /* ══ ADD MODAL ══ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 15, 25, .55);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 28px;
            width: min(92vw, 460px);
            transform: translateY(14px);
            transition: transform .2s;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal h3 {
            font-size: 1.05rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: #1a2535;
        }

        .modal-field {
            margin-bottom: 14px;
        }

        .modal-field label {
            display: block;
            font-size: .82rem;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .modal-field input,
        .modal-field select {
            width: 100%;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            padding: 10px 13px;
            color: #1a2535;
            font-family: 'Tajawal', sans-serif;
            font-size: .9rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        .modal-field input:focus,
        .modal-field select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .1);
            background: #fff;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 22px;
        }

        .btn-modal-cancel {
            padding: 10px 18px;
            background: #f1f5f9;
            color: #64748b;
            border: 1.5px solid #e2e8f0;
            border-radius: 9px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: .9rem;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-modal-cancel:hover {
            background: #e2e8f0;
        }

        .btn-modal-save {
            padding: 10px 22px;
            background: #16a34a;
            color: #fff;
            border: none;
            border-radius: 9px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: .9rem;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-modal-save:hover {
            background: #15803d;
            transform: translateY(-1px);
        }

        /* ══ EMPTY ══ */
        #empty {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            background: #fff;
            border-radius: 14px;
            border: 1.5px dashed #e2e8f0;
        }

        #empty .emoji {
            font-size: 44px;
            margin-bottom: 12px;
        }

        #empty p {
            font-size: .95rem;
        }

        /* ══ TOAST ══ */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(40px);
            padding: 11px 22px;
            border-radius: 50px;
            font-size: .88rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            transition: transform .3s, opacity .3s;
            opacity: 0;
            z-index: 999;
            white-space: nowrap;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.18);
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        #toast.success {
            background: #16a34a;
            color: #fff;
        }

        #toast.error {
            background: #dc2626;
            color: #fff;
        }

        #toast.info {
            background: #2563eb;
            color: #fff;
        }

        /* ══ RESPONSIVE ══ */
        @media(max-width:700px) {
            .phone-item {
                flex-wrap: wrap;
            }

            .phone-info {
                width: 100%;
            }

            .price-label {
                width: 55px;
            }

            .phone-prices {
                align-items: normal;
                width: 100%;
                padding: 0;
                justify-content: flex-start;
                gap: 8px;
            }

            .price-badge {
                min-width: 80px;
                font-size: .85rem;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .toolbar-divider {
                display: none;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #f0f2f5;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>

<body>

    <!-- ── Connection Dialog ── -->
    <div id="connOverlay" class="open">
        <div class="conn-dialog">
            <div class="conn-field">
                <label>Database URL</label>
                <input type="text" id="dbUrl" placeholder="" dir="ltr">
            </div>
            <div class="conn-field">
                <label>Auth Token</label>
                <input type="password" id="dbToken" placeholder="eyJ...">
            </div>
            <div class="conn-actions">
                <span id="connDialogStatus"></span>
                <button class="btn-conn-submit" id="btnConnSubmit" onclick="connectDB()">اتصال</button>
            </div>
        </div>
    </div>

    <div class="container">

        <!-- ── Header ── -->
        <div class="header">
            <div class="header-right">
                <h1>قائمة أسعار الجوالات</h1>
            </div>
            <div class="header-meta">
                <div class="stat-pill">الأجهزة <strong id="totalCount">—</strong></div>
                <div class="stat-pill">مُسعَّر <strong id="pricedCount">—</strong></div>
                <button class="btn-reconnect" onclick="openConnDialog()">⚙️ اتصال</button>
            </div>
        </div>

        <!-- ── Toolbar ── -->
        <div class="toolbar">
            <div class="brand-btns">
                <button class="brand-btn active" data-brand="" onclick="setBrand(this,'')">الكل</button>
                <button class="brand-btn apple" data-brand="Apple" onclick="setBrand(this,'Apple')"> Apple</button>
                <button class="brand-btn samsung" data-brand="Samsung"
                    onclick="setBrand(this,'Samsung')">Samsung</button>
            </div>
            <div class="toolbar-divider"></div>
            <select class="year-select" id="yearFilter">
                <option value="">كل السنوات</option>
            </select>
            <div class="toolbar-divider"></div>
            <button class="btn btn-add" id="btnAdd" onclick="openAddModal()" disabled>＋ إضافة جهاز</button>
            <button class="btn btn-ghost" onclick="clearFilters()">🔄 مسح</button>
            <button class="btn btn-ghost" id="btnRefresh" onclick="loadPhones()" disabled>↻ تحديث</button>
            <div class="search-wrap">
                <input type="text" id="search" placeholder="بحث عن جهاز..." autocomplete="off">
            </div>
        </div>

        <!-- ── Results Bar ── -->
        <div class="results-bar">
            <div>عرض <strong id="shownCount">—</strong> جهاز</div>
            <div class="legend">
                <div class="legend-item">
                    <div class="dot" style="background:#16a34a"></div><span>جديد</span>
                </div>
                <div class="legend-item">
                    <div class="dot" style="background:#ea580c"></div><span>مستعمل</span>
                </div>
            </div>
        </div>

        <!-- ── Phone List ── -->
        <div class="phone-list" id="grid"></div>
        <div id="empty">
            <div class="emoji">🔍</div>
            <p>لا يوجد جهاز بهذا الاسم</p>
        </div>

    </div>

    <!-- ── Add Modal ── -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h3>➕ إضافة جهاز جديد</h3>
            <div class="modal-field">
                <label>الماركة</label>
                <select id="newBrand">
                    <option value="Apple">Apple</option>
                    <option value="Samsung">Samsung</option>
                </select>
            </div>
            <div class="modal-field">
                <label>اسم الموديل</label>
                <input type="text" id="newModel" placeholder="مثال: iPhone 16 Pro 256GB" dir="rtl">
            </div>
            <div class="modal-field">
                <label>سنة الإصدار</label>
                <input type="number" id="newYear" placeholder="2024" min="2010" max="2030">
            </div>
            <div class="modal-field">
                <label>سعر الجديد (اختياري)</label>
                <input type="number" id="newPriceNew" placeholder="0">
            </div>
            <div class="modal-field">
                <label>سعر المستعمل (اختياري)</label>
                <input type="number" id="newPriceUsed" placeholder="0">
            </div>
            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closeAddModal()">إلغاء</button>
                <button class="btn-modal-save" onclick="addPhone()">حفظ</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let DB_URL = localStorage.getItem('turso_url') || '';
        let DB_TOKEN = localStorage.getItem('turso_token') || '';
        let phones = [];
        let searchQ = '', brandFilter = '', yearFilter = '';

        window.onload = () => {
            document.getElementById('dbUrl').value = DB_URL;
            document.getElementById('dbToken').value = DB_TOKEN;
            if (DB_URL && DB_TOKEN) connectDB(true);
        };

        /* ── Connection ── */
        function openConnDialog() {
            document.getElementById('dbUrl').value = DB_URL;
            document.getElementById('dbToken').value = DB_TOKEN;
            setDialogStatus('', '');
            document.getElementById('connOverlay').classList.add('open');
        }
        function closeConnDialog() { document.getElementById('connOverlay').classList.remove('open'); }
        function setDialogStatus(msg, type) {
            const el = document.getElementById('connDialogStatus');
            el.textContent = msg;
            el.className = type ? 'status-' + type : '';
        }

        /* ── Turso HTTP API ── */
        async function turso(sql, args = []) {
            if (!DB_URL || !DB_TOKEN) throw new Error('غير متصل');
            const url = DB_URL.endsWith('/') ? DB_URL + 'v2/pipeline' : DB_URL + '/v2/pipeline';
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DB_TOKEN },
                body: JSON.stringify({
                    requests: [{
                        type: 'execute',
                        stmt: {
                            sql, args: args.map(v => {
                                if (v === null || v === undefined || v === '') return { type: 'null' };
                                if (typeof v === 'number') return { type: 'integer', value: String(v) };
                                return { type: 'text', value: String(v) };
                            })
                        }
                    }, { type: 'close' }]
                })
            });
            if (!res.ok) { const txt = await res.text(); throw new Error(txt); }
            const data = await res.json();
            if (data.results?.[0]?.type === 'error') throw new Error(data.results[0].error.message);
            return data.results[0]?.response?.result;
        }

        function rowsToObjects(result) {
            if (!result?.cols || !result?.rows) return [];
            const cols = result.cols.map(c => c.name);
            return result.rows.map(row => Object.fromEntries(cols.map((c, i) => [c, row[i]?.value ?? null])));
        }

        async function connectDB(silent = false) {
            DB_URL = document.getElementById('dbUrl').value.trim();
            DB_TOKEN = document.getElementById('dbToken').value.trim();
            if (!DB_URL || !DB_TOKEN) { if (!silent) showToast('أدخل URL و Token أولاً', 'error'); return; }

            const btn = document.getElementById('btnConnSubmit');
            btn.disabled = true;
            setDialogStatus('⏳ جاري الاتصال...', 'loading');
            try {
                await turso('SELECT 1');
                localStorage.setItem('turso_url', DB_URL);
                localStorage.setItem('turso_token', DB_TOKEN);
                setDialogStatus('✅ تم الاتصال!', 'ok');
                document.getElementById('btnAdd').disabled = false;
                document.getElementById('btnRefresh').disabled = false;
                setTimeout(() => closeConnDialog(), 700);
                await loadPhones();
            } catch (e) {
                setDialogStatus('❌ ' + e.message, 'err');
                if (!silent) showToast('فشل الاتصال', 'error');
                if (silent) openConnDialog();
            } finally { btn.disabled = false; }
        }

        /* ── Load ── */
        async function loadPhones() {
            showSkeletons();
            try {
                const result = await turso('SELECT * FROM phones ORDER BY brand, release_year DESC, model');
                phones = rowsToObjects(result);
                populateYears();
                render();
                updateStats();
            } catch (e) {
                showToast('خطأ في تحميل البيانات: ' + e.message, 'error');
                document.getElementById('grid').innerHTML = '';
            }
        }

        /* ── Render ── */
        function getFiltered() {
            const q = searchQ.trim().toLowerCase();
            return phones.filter(d => {
                const ms = !q || d.model.toLowerCase().includes(q) || d.brand.toLowerCase().includes(q);
                const mb = !brandFilter || d.brand === brandFilter;
                const my = !yearFilter || String(d.release_year) === yearFilter;
                return ms && mb && my;
            });
        }

        function fmt(v) {
            if (!v && v !== 0) return null;
            return Number(v).toLocaleString('ar-SA') + ' ر.س';
        }

        function render() {
            const filtered = getFiltered();
            const grid = document.getElementById('grid');
            const empty = document.getElementById('empty');
            document.getElementById('shownCount').textContent = filtered.length;

            if (filtered.length === 0) { grid.style.display = 'none'; empty.style.display = 'block'; return; }
            grid.style.display = 'flex';
            empty.style.display = 'none';

            grid.innerHTML = filtered.map(d => {
                const np = d.new_price || '';
                const up = d.used_price || '';
                const npF = fmt(np);
                const upF = fmt(up);
                return `
<div class="phone-item brand-${d.brand}" data-id="${d.id}">
  <div class="phone-info">
    <div class="phone-icon">📱</div>
    <div class="phone-details">
      <h4>${escHtml(d.model)}</h4>
      <div class="badges">
        <span class="brand-badge">${d.brand}</span>
        <span class="year-badge">${d.release_year}</span>
      </div>
    </div>
  </div>

  <div class="phone-prices">
    <div class="price-row">
      <div class="price-indicator new-indicator"></div>
      <span class="price-label">جديد</span>
      <span class="price-badge new-badge${np ? '' : ' empty-badge'}"
            onclick="startEdit(this,'new_price',${d.id})">
        ${npF || '+ أضف سعراً'}
      </span>
      <div class="price-input-wrap" id="edit-new-${d.id}">
        <input type="number" class="price-input new-price"
               placeholder="السعر..." value="${escHtml(np)}"
               data-id="${d.id}" data-field="new_price"
               onkeydown="handleKey(event,this)">
        <button class="save-btn" onclick="savePrice(this)"
                data-id="${d.id}" data-field="new_price">✓</button>
      </div>
    </div>
    <div class="price-row">
      <div class="price-indicator used-indicator"></div>
      <span class="price-label">مستعمل</span>
      <span class="price-badge used-badge${up ? '' : ' empty-badge'}"
            onclick="startEdit(this,'used_price',${d.id})">
        ${upF || '+ أضف سعراً'}
      </span>
      <div class="price-input-wrap" id="edit-used-${d.id}">
        <input type="number" class="price-input used-price"
               placeholder="السعر..." value="${escHtml(up)}"
               data-id="${d.id}" data-field="used_price"
               onkeydown="handleKey(event,this)">
        <button class="save-btn" onclick="savePrice(this)"
                data-id="${d.id}" data-field="used_price">✓</button>
      </div>
    </div>
  </div>

  <div class="phone-actions">
    <button class="btn-delete-card"
            onclick="deletePhone(${d.id},'${escHtml(d.model)}')" title="حذف">🗑</button>
  </div>
</div>`;
            }).join('');
        }

        function escHtml(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showSkeletons() {
            const grid = document.getElementById('grid');
            grid.style.display = 'flex';
            document.getElementById('empty').style.display = 'none';
            grid.innerHTML = Array(8).fill('<div class="skeleton"></div>').join('');
        }

        /* ── Price Edit (badge → input toggle) ── */
        function startEdit(badge, field, id) {
            const key = field === 'new_price' ? 'new' : 'used';
            const wrap = document.getElementById(`edit-${key}-${id}`);
            badge.style.display = 'none';
            wrap.classList.add('editing');
            wrap.querySelector('input').focus();
        }

        function finishEdit(input) {
            const id = input.dataset.id;
            const field = input.dataset.field;
            const key = field === 'new_price' ? 'new' : 'used';
            const wrap = document.getElementById(`edit-${key}-${id}`);
            wrap.classList.remove('editing');
            wrap.previousElementSibling.style.display = '';
        }

        function handleKey(e, input) {
            if (e.key === 'Enter') input.closest('.price-input-wrap').querySelector('.save-btn').click();
            if (e.key === 'Escape') finishEdit(input);
        }

        async function savePrice(btn) {
            const id = btn.dataset.id;
            const field = btn.dataset.field;
            const wrap = btn.closest('.price-input-wrap');
            const input = wrap.querySelector('input.price-input');
            const val = input.value.trim();

            btn.classList.add('saving'); btn.textContent = '⏳';
            try {
                await turso(`UPDATE phones SET ${field} = ?, updated_at = datetime('now') WHERE id = ?`, [val, parseInt(id)]);
                const phone = phones.find(p => String(p.id) === String(id));
                if (phone) phone[field] = val;
                updateStats();
                btn.textContent = '✅';
                setTimeout(() => {
                    btn.textContent = '✓'; btn.classList.remove('saving');
                    finishEdit(input);
                    // update badge
                    const key = field === 'new_price' ? 'new' : 'used';
                    const badge = document.getElementById(`edit-${key}-${id}`).previousElementSibling;
                    const fmtV = fmt(val);
                    if (fmtV) {
                        badge.textContent = fmtV;
                        badge.classList.remove('empty-badge');
                    } else {
                        badge.textContent = '+ أضف سعراً';
                        badge.classList.add('empty-badge');
                    }
                }, 800);
            } catch (e) {
                btn.textContent = '✕'; showToast('خطأ في الحفظ', 'error');
                setTimeout(() => { btn.textContent = '✓'; btn.classList.remove('saving'); }, 1500);
            }
        }

        /* ── Add Phone ── */
        function openAddModal() { document.getElementById('addModal').classList.add('open'); }
        function closeAddModal() {
            document.getElementById('addModal').classList.remove('open');
            ['newModel', 'newYear', 'newPriceNew', 'newPriceUsed'].forEach(id => document.getElementById(id).value = '');
        }

        async function addPhone() {
            const brand = document.getElementById('newBrand').value;
            const model = document.getElementById('newModel').value.trim();
            const year = parseInt(document.getElementById('newYear').value);
            const newPrice = document.getElementById('newPriceNew').value.trim();
            const usedPrice = document.getElementById('newPriceUsed').value.trim();

            if (!model) { showToast('أدخل اسم الموديل', 'error'); return; }
            if (!year || year < 2010 || year > 2030) { showToast('أدخل سنة صحيحة', 'error'); return; }

            try {
                await turso('INSERT INTO phones (brand, model, release_year, new_price, used_price) VALUES (?, ?, ?, ?, ?)',
                    [brand, model, year, newPrice, usedPrice]);
                closeAddModal();
                showToast('✅ تمت الإضافة', 'success');
                await loadPhones();
            } catch (e) {
                if (e.message.includes('UNIQUE')) showToast('الموديل موجود مسبقاً', 'error');
                else showToast('خطأ: ' + e.message, 'error');
            }
        }

        /* ── Delete ── */
        async function deletePhone(id, model) {
            if (!confirm(`هل تريد حذف "${model}"؟`)) return;
            try {
                await turso('DELETE FROM phones WHERE id = ?', [parseInt(id)]);
                phones = phones.filter(p => String(p.id) !== String(id));
                render(); updateStats();
                showToast('🗑 تم الحذف', 'info');
            } catch (e) { showToast('خطأ في الحذف', 'error'); }
        }

        /* ── Filters ── */
        function setBrand(btn, brand) {
            brandFilter = brand;
            document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = phones.length;
            document.getElementById('pricedCount').textContent = phones.filter(p => p.new_price || p.used_price).length;
        }

        function populateYears() {
            const years = [...new Set(phones.map(d => d.release_year))].filter(Boolean).sort((a, b) => b - a);
            const sel = document.getElementById('yearFilter');
            const cur = sel.value;
            sel.innerHTML = '<option value="">كل السنوات</option>';
            years.forEach(y => {
                const o = document.createElement('option');
                o.value = y; o.textContent = y;
                if (String(y) === cur) o.selected = true;
                sel.appendChild(o);
            });
        }

        function clearFilters() {
            document.getElementById('search').value = '';
            document.getElementById('yearFilter').value = '';
            document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.brand-btn[data-brand=""]').classList.add('active');
            searchQ = ''; brandFilter = ''; yearFilter = '';
            render();
        }

        let searchTimer;
        document.getElementById('search').addEventListener('input', e => {
            searchQ = e.target.value;
            clearTimeout(searchTimer);
            searchTimer = setTimeout(render, 200);
        });
        document.getElementById('yearFilter').addEventListener('change', e => { yearFilter = e.target.value; render(); });

        /* ── Toast ── */
        let toastTimer;
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = `show ${type}`;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.className = '', 2200);
        }

        document.getElementById('addModal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeAddModal();
        });
    </script>
</body>

</html>
